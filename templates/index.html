<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes & Share</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Outfit & Inter Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header class="app-header">
            <div class="logo-area">
                <i class="fa-solid fa-database logo-icon"></i>
                <div class="logo-text">
                    <h1>BigQuery</h1>
                    <span>Release Notes Hub</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn btn-secondary" title="Toggle Theme">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </button>
                <button id="export-csv-btn" class="btn btn-secondary" title="Export Notes to CSV">
                    <i class="fa-solid fa-file-csv"></i>
                    <span>Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <i class="fa-solid fa-rotate spinner-icon" id="spinner"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <main class="content-area">
            <div class="feed-status" id="feed-status">
                <div class="shimmer-card"></div>
                <div class="shimmer-card"></div>
                <div class="shimmer-card"></div>
            </div>
            
            <div id="notes-container" class="notes-container hidden">
                <!-- Notes will be loaded here dynamically -->
            </div>
        </main>
    </div>

    <!-- Tweet Modal -->
    <div id="tweet-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Draft Tweet</h3>
                <button class="close-btn" id="close-modal-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <textarea id="tweet-textarea" maxlength="280" placeholder="What's happening?"></textarea>
                <div class="char-counter"><span id="char-count">0</span>/280</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-tweet-btn">Cancel</button>
                <button class="btn btn-twitter" id="submit-tweet-btn">
                    <i class="fa-brands fa-x-twitter"></i> Post to X
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
